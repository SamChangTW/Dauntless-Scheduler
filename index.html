<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="app-version" content="2.7.5" data-version="2.7.5" />
    <title>Dauntless Scheduler — CloudLink Diagnose</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=5" />
    <link rel="stylesheet" href="modal.css?v=5" />
    <!-- UI polish theme overrides -->
    <link rel="stylesheet" href="theme.css?v=5" />
    <!-- TSAA Design System (Dauntless Command · Obsidian Dark) -->
    <link rel="stylesheet" href="ui/tsaa_tokens.css?v=5" />
    <link rel="stylesheet" href="ui/scheduler.css?v=5" />
    <script src="ui/theme-loader.js"></script>
    <script>window.TSAA_THEME_URL = 'ui/tsaa_theme.json';</script>
</head>

<body class="theme-scheduler">
    <header class="tsaa-nav">
        <h1>
            Dauntless Scheduler
            <small data-version-display><!-- 由 app.js 依 CONFIG.VERSION 動態填入 --></small>
        </h1>
        <div id="console" class="console"></div>
    </header>

    <main class="tsaa-layout">
        <section class="panel tsaa-card">
            <h2>建立 / 編輯賽程</h2>
            <form id="dlgForm" class="form" autocomplete="off">
                <label>
                    日期(僅星期日)
                    <input id="f_date" type="date" required>
                </label>
                <div id="avoidHint" class="hint"></div>

                <label>
                    場地 / 聯盟
                    <select id="f_venue" required>
                        <option value="" disabled selected>請選擇</option>
                        <option>海客</option>
                        <option>美堤</option>
                        <option>其它</option>
                    </select>
                </label>

                <fieldset class="time-group">
                    <legend>時間(可選 2–4 個整點)</legend>
                    <div id="slotWrap" class="slots"></div>
                </fieldset>

                <label>
                    備註
                    <input id="f_notes" type="text" placeholder="可留空" />
                </label>

                <div class="actions">
                    <button class="tsaa-btn" id="btnSubmit" type="submit">💾 儲存(寫入雲端)</button>
                    <button class="tsaa-btn tsaa-btn--ghost" id="btnReload" type="button">重新載入</button>
                    <button class="tsaa-btn tsaa-btn--ghost" id="btnAvoidList" type="button">🔎 查詢「需避開」週日(未來二季)</button>
                </div>
            </form>
        </section>

        <section class="panel tsaa-card">
            <div class="toolbar">
                <button class="tsaa-btn tsaa-btn--ghost" id="btnHistory">📜 查詢歷史賽程</button>
                <button class="tsaa-btn" id="btnList">📋 已安排賽程</button>
                <button class="tsaa-btn tsaa-btn--secondary" id="btnValidate">🧪 自動驗證(CSV & API)</button>
            </div>
            <div id="listWrap" class="list tsaa-table"></div>
            <div id="validateWrap" class="validate"></div>
        </section>
    </main>

    <!-- Modal / Dialog for lists -->
    <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal tsaa-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal__header">
                <h3 id="modalTitle">清單</h3>
                <button id="modalClose" class="modal__close tsaa-btn tsaa-btn--icon" aria-label="關閉">×</button>
            </div>
            <div id="modalBody" class="modal__body tsaa-table"></div>
        </div>
        <div class="modal__backdrop"></div>

    </div>

    <footer>
        <small>© 2025 Dauntless Scheduler · Designed by Sam × C⁵</small>
    </footer>

    <script src="config.js?v=5"></script>
    <script src="cors-proxy-helper.js?v=5"></script>
    <script src="app.js?v=5"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>

</html>
